# ROSA-specific overrides for aws-vpc-cni.
# Only values that differ from the chart defaults are included.

init:
  image:
    region: ${AWS_REGION}
  env:
    HOST_CNI_BIN_PATH: /host/var/lib/cni/bin
    HOST_CNI_CONFDIR_PATH: /host/run/multus/cni/net.d

nodeAgent:
  image:
    region: ${AWS_REGION}

image:
  region: ${AWS_REGION}

env:
  AWS_VPC_ENI_MTU: "1500"
  ENI_CONFIG_LABEL_DEF: "failure-domain.beta.kubernetes.io/zone"
  POD_SECURITY_GROUP_ENFORCING_MODE: "standard"
  HOST_CNI_BIN_PATH: /host/var/lib/cni/bin
  HOST_CNI_CONFDIR_PATH: /host/run/multus/cni/net.d

# ROSA/CRI-O host paths mounted into the main container
extraVolumeMounts:
  - name: cni-bin-dir-rosa
    mountPath: /host/var/lib/cni/bin
  - name: multus-cni-dir
    mountPath: /host/run/multus/cni/net.d

# ROSA/CRI-O host path volumes
extraVolumes:
  - name: cni-bin-dir-rosa
    hostPath:
      path: /var/lib/cni/bin
  - name: multus-cni-dir
    hostPath:
      path: /run/multus/cni/net.d

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::${AWS_ACCOUNT_ID}:role/${IAM_ROLE_NAME}